<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Lista de Tarefas</h1></header>
    <main>
        <section>
            <h2>Adicionar Tarefa:</h2>
            <label for="tarefa">Digite uma tarefa:</label>
            <input id="tarefa" type="text" placeholder="Lavar a louça...">
            <button id="botaoAdicionar">Adicionar à lista</button>
        </section>
        <section>
            <h2>Minha Lista:</h2>
            <ul id="lista"></ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
